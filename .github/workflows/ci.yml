name: ci

on:
  push:

jobs:
  build-test-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test station-service
        working-directory: station-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install and test session-service
        working-directory: session-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build station image
        run: docker build -t chargesquare-station:ci ./station-service

      - name: Build session image
        run: docker build -t chargesquare-session:ci ./session-service
